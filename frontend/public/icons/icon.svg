<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="playGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff0000;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#cc0000;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bgGrad)"/>
  
  <!-- Play Button Circle -->
  <circle cx="256" cy="256" r="180" fill="url(#playGrad)"/>
  
  <!-- Play Triangle -->
  <path d="M200 140 L380 256 L200 372 Z" fill="white"/>
  
  <!-- Brand Text -->
  <text x="256" y="440" text-anchor="middle" font-family="Arial, sans-serif" font-size="44" font-weight="bold" fill="white">Premium</text>
</svg>
